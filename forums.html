<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forums | OGz C-Strike Gangstaz</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: Arial, sans-serif; font-weight: bold; background: #0d0d0d; color: #e0e0e0; line-height: 1.5; }

  header { background: linear-gradient(180deg, #0a0a0a 0%, #111 100%); border-bottom: 3px solid #1e90ff; text-align: center; padding: 40px 20px 30px; }
  header h1 { font-size: 3rem; letter-spacing: 4px; color: #fff; text-transform: uppercase; }
  header h2 { font-size: 1.1rem; letter-spacing: 6px; color: #1e90ff; text-transform: uppercase; margin-top: 8px; }

  nav { background: #161616; border-bottom: 1px solid #2a2a2a; display: flex; justify-content: center; gap: 4px; padding: 0 20px; flex-wrap: wrap; }
  nav a { color: #aaa; text-decoration: none; font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase; padding: 14px 20px; transition: color 0.2s, border-bottom 0.2s; border-bottom: 3px solid transparent; }
  nav a:hover { color: #1e90ff; border-bottom: 3px solid #1e90ff; }
  nav a.active { color: #1e90ff; border-bottom: 3px solid #1e90ff; }

  main { max-width: 900px; margin: 0 auto; padding: 40px 20px; display: flex; flex-direction: column; gap: 32px; }

  /* TOP BAR */
  .top-bar { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
  .top-bar-user { font-size: 0.8rem; letter-spacing: 2px; color: #1e90ff; text-transform: uppercase; }
  .top-bar-actions { display: flex; gap: 8px; align-items: center; }
  .login-link { background: #1e90ff; color: #000; font-family: Arial, sans-serif; font-weight: bold; font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; padding: 8px 16px; border: none; cursor: pointer; transition: background 0.2s; }
  .login-link:hover { background: #4da6ff; }
  .logout-btn { background: none; border: 1px solid #2a2a2a; color: #555; font-family: Arial, sans-serif; font-weight: bold; font-size: 0.65rem; letter-spacing: 2px; text-transform: uppercase; padding: 6px 12px; cursor: pointer; transition: color 0.2s, border-color 0.2s; }
  .logout-btn:hover { color: #ff4444; border-color: #ff4444; }

  /* AUTH MODAL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
  .modal-box { background: #161616; border: 1px solid #2a2a2a; border-top: 3px solid #1e90ff; padding: 32px; width: 100%; max-width: 380px; }
  .modal-close { float: right; background: none; border: none; color: #555; font-size: 1.2rem; cursor: pointer; margin-top: -8px; margin-right: -8px; }
  .modal-close:hover { color: #fff; }
  .auth-tabs { display: flex; margin-bottom: 24px; border-bottom: 1px solid #2a2a2a; }
  .auth-tab { padding: 10px 20px; font-size: 0.75rem; letter-spacing: 2px; text-transform: uppercase; color: #555; cursor: pointer; border: none; border-bottom: 3px solid transparent; margin-bottom: -1px; background: none; font-family: Arial, sans-serif; font-weight: bold; transition: color 0.2s; }
  .auth-tab.active { color: #1e90ff; border-bottom-color: #1e90ff; }
  .auth-form { display: flex; flex-direction: column; gap: 10px; }
  .auth-form label { font-size: 0.65rem; letter-spacing: 2px; text-transform: uppercase; color: #555; margin-bottom: -4px; }
  .auth-form input { background: #111; border: 1px solid #333; color: #fff; font-family: Arial, sans-serif; font-size: 0.85rem; padding: 10px 14px; outline: none; transition: border-color 0.2s; width: 100%; }
  .auth-form input:focus { border-color: #1e90ff; }
  .auth-submit { background: #1e90ff; color: #000; font-family: Arial, sans-serif; font-weight: bold; font-size: 0.75rem; letter-spacing: 2px; text-transform: uppercase; padding: 12px; border: none; cursor: pointer; transition: background 0.2s; margin-top: 4px; }
  .auth-submit:hover { background: #4da6ff; }
  .auth-error { font-size: 0.75rem; color: #ff4444; letter-spacing: 1px; min-height: 18px; font-weight: normal; }

  /* CATEGORY SECTIONS */
  .category-section { display: flex; flex-direction: column; gap: 0; }
  .category-header { background: #111; border: 1px solid #2a2a2a; border-top: 3px solid #1e90ff; padding: 14px 18px; display: flex; justify-content: space-between; align-items: center; }
  .category-name { font-size: 0.75rem; letter-spacing: 4px; text-transform: uppercase; color: #1e90ff; }
  .new-thread-btn { background: #1e90ff; color: #000; font-family: Arial, sans-serif; font-weight: bold; font-size: 0.65rem; letter-spacing: 2px; text-transform: uppercase; padding: 7px 14px; border: none; cursor: pointer; transition: background 0.2s; }
  .new-thread-btn:hover { background: #4da6ff; }
  .login-to-post { font-size: 0.65rem; letter-spacing: 1px; color: #444; text-transform: uppercase; cursor: pointer; }
  .login-to-post:hover { color: #1e90ff; }

  /* THREAD LIST */
  .thread-item { background: #161616; border: 1px solid #1e1e1e; border-top: none; padding: 13px 18px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: background 0.15s; gap: 16px; }
  .thread-item:hover { background: #1c1c1c; }
  .thread-left { display: flex; flex-direction: column; gap: 3px; flex: 1; min-width: 0; }
  .thread-title-text { font-size: 0.88rem; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .thread-meta { font-size: 0.65rem; color: #444; font-weight: normal; letter-spacing: 1px; }
  .thread-meta b { color: #1e90ff; font-weight: bold; }
  .thread-reply-count { font-size: 0.65rem; color: #333; text-transform: uppercase; letter-spacing: 1px; white-space: nowrap; flex-shrink: 0; }
  .threads-empty { background: #111; border: 1px solid #1e1e1e; border-top: none; padding: 28px; text-align: center; font-size: 0.7rem; letter-spacing: 2px; color: #333; text-transform: uppercase; font-weight: normal; }
  .threads-loading { background: #111; border: 1px solid #1e1e1e; border-top: none; padding: 20px; text-align: center; font-size: 0.7rem; color: #333; letter-spacing: 2px; text-transform: uppercase; font-weight: normal; }

  /* NEW THREAD FORM */
  .new-thread-form { background: #161616; border: 1px solid #2a2a2a; border-top: none; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
  .form-input { background: #111; border: 1px solid #333; color: #fff; font-family: Arial, sans-serif; font-size: 0.85rem; padding: 10px 14px; outline: none; transition: border-color 0.2s; width: 100%; }
  .form-input:focus { border-color: #1e90ff; }
  textarea.form-input { resize: vertical; min-height: 90px; font-weight: normal; }
  .form-row { display: flex; justify-content: space-between; align-items: center; gap: 12px; }
  .cancel-btn { background: none; border: 1px solid #2a2a2a; color: #555; font-family: Arial, sans-serif; font-weight: bold; font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; padding: 8px 16px; cursor: pointer; transition: color 0.2s, border-color 0.2s; }
  .cancel-btn:hover { color: #fff; border-color: #555; }
  .submit-btn { background: #1e90ff; color: #000; font-family: Arial, sans-serif; font-weight: bold; font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; padding: 8px 20px; border: none; cursor: pointer; transition: background 0.2s; }
  .submit-btn:hover { background: #4da6ff; }
  .submit-btn:disabled { background: #222; color: #555; cursor: default; }
  .form-error { font-size: 0.7rem; color: #ff4444; letter-spacing: 1px; min-height: 16px; font-weight: normal; }

  /* THREAD VIEW */
  .back-btn { background: none; border: none; color: #1e90ff; font-family: Arial, sans-serif; font-weight: bold; font-size: 0.75rem; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; padding: 0; margin-bottom: 12px; display: inline-block; }
  .back-btn:hover { color: #fff; }
  .thread-view-title { font-size: 1.2rem; color: #fff; margin-bottom: 4px; }
  .thread-view-meta { font-size: 0.65rem; color: #444; letter-spacing: 1px; font-weight: normal; margin-bottom: 16px; }
  .thread-view-meta b { color: #1e90ff; }
  .post-item { background: #161616; border: 1px solid #1e1e1e; border-top: none; padding: 16px 18px; display: flex; flex-direction: column; gap: 8px; }
  .post-item:first-child { border-top: 1px solid #1e1e1e; }
  .post-item.op { border-left: 3px solid #1e90ff; }
  .post-header { display: flex; justify-content: space-between; align-items: baseline; gap: 12px; }
  .post-author { font-size: 0.75rem; letter-spacing: 2px; color: #1e90ff; text-transform: uppercase; }
  .post-date { font-size: 0.65rem; color: #3a3a3a; font-weight: normal; }
  .post-body { font-size: 0.85rem; color: #ccc; font-weight: normal; line-height: 1.65; white-space: pre-wrap; word-break: break-word; }
  .reply-form { background: #161616; border: 1px solid #2a2a2a; border-top: none; padding: 16px 18px; display: flex; flex-direction: column; gap: 10px; }
  .login-to-reply { background: #161616; border: 1px solid #1e1e1e; border-top: none; padding: 16px 18px; font-size: 0.75rem; color: #444; text-align: center; letter-spacing: 1px; text-transform: uppercase; }
  .login-to-reply span { color: #1e90ff; cursor: pointer; }
  .login-to-reply span:hover { text-decoration: underline; }

  footer { background: #0a0a0a; border-top: 1px solid #1e1e1e; text-align: center; padding: 28px 20px; font-size: 0.7rem; letter-spacing: 2px; color: #444; text-transform: uppercase; }
  .hidden { display: none !important; }

  @media (max-width: 600px) {
    header h1 { font-size: 1.8rem; }
    .thread-reply-count { display: none; }
  }
</style>
</head>
<body>

<header>
  <h1>OGz C-Strike Gangstaz</h1>
  <h2>Forums</h2>
</header>

<nav>
  <a href="index.html">Home</a>
  <a href="forums.html" class="active">Forums</a>
</nav>

<main id="app">
  <div style="padding:60px;text-align:center;font-size:0.75rem;letter-spacing:3px;color:#333;text-transform:uppercase;">Loading...</div>
</main>

<div id="auth-modal" class="hidden">
  <div class="modal-overlay" onclick="closeModal(event)">
    <div class="modal-box">
      <button class="modal-close" onclick="hideModal()">&#10005;</button>
      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-login"    onclick="switchTab('login')">Login</button>
        <button class="auth-tab"        id="tab-register" onclick="switchTab('register')">Register</button>
      </div>
      <div id="pane-login">
        <form class="auth-form" id="login-form">
          <label>Email</label>
          <input type="email" id="login-email" required autocomplete="email">
          <label>Password</label>
          <input type="password" id="login-pass" required autocomplete="current-password">
          <div class="auth-error" id="login-err"></div>
          <button type="submit" class="auth-submit">Login</button>
        </form>
      </div>
      <div id="pane-register" class="hidden">
        <form class="auth-form" id="reg-form">
          <label>Username</label>
          <input type="text" id="reg-name" maxlength="24" required>
          <label>Email</label>
          <input type="email" id="reg-email" required autocomplete="email">
          <label>Password</label>
          <input type="password" id="reg-pass" minlength="6" required autocomplete="new-password">
          <div class="auth-error" id="reg-err"></div>
          <button type="submit" class="auth-submit">Create Account</button>
        </form>
      </div>
    </div>
  </div>
</div>

<footer>
  &copy; OGz C-Strike Gangstaz &nbsp;|&nbsp; CS2 Superhero Mod
</footer>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, updateProfile } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
  import { getFirestore, collection, addDoc, doc, setDoc, updateDoc, increment, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCGpy67LqR4cosW2OM8lbLcCNT6ir74Lxk",
    authDomain: "superhero-34095.firebaseapp.com",
    databaseURL: "https://superhero-34095-default-rtdb.firebaseio.com",
    projectId: "superhero-34095",
    storageBucket: "superhero-34095.firebasestorage.app",
    messagingSenderId: "709820811872",
    appId: "1:709820811872:web:71ea577ddff2756d131105"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db   = getFirestore(app);

  const CATEGORIES = ["General", "Off-Topic", "Hero Requests"];
  const appEl = document.getElementById("app");

  let currentUser   = null;
  let currentThread = null;
  let threadsCache  = {};
  let unsubMap      = {};
  let unsubPosts    = null;

  // ── Utilities ─────────────────────────────────────────────────────────────

  function esc(str) {
    return String(str || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  function timeAgo(ts) {
    if (!ts) return "";
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    const diff = Date.now() - d.getTime();
    if (diff < 60000) return "just now";
    if (diff < 3600000) return Math.floor(diff/60000) + "m ago";
    if (diff < 86400000) return Math.floor(diff/3600000) + "h ago";
    if (diff < 2592000000) return Math.floor(diff/86400000) + "d ago";
    return d.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
  }

  function authErrMsg(code) {
    return ({
      "auth/invalid-email":        "Invalid email address.",
      "auth/user-not-found":       "No account found.",
      "auth/wrong-password":       "Incorrect password.",
      "auth/invalid-credential":   "Invalid email or password.",
      "auth/email-already-in-use": "Email already registered.",
      "auth/weak-password":        "Password must be at least 6 characters.",
      "auth/too-many-requests":    "Too many attempts. Try again later."
    })[code] || "Something went wrong. Try again.";
  }

  // ── Auth modal ────────────────────────────────────────────────────────────

  window.showModal = function() {
    document.getElementById("auth-modal").classList.remove("hidden");
  };
  window.hideModal = function() {
    document.getElementById("auth-modal").classList.add("hidden");
  };
  window.closeModal = function(e) {
    if (e.target === e.currentTarget) hideModal();
  };
  window.switchTab = function(tab) {
    document.getElementById("pane-login").classList.toggle("hidden",    tab !== "login");
    document.getElementById("pane-register").classList.toggle("hidden", tab !== "register");
    document.getElementById("tab-login").classList.toggle("active",    tab === "login");
    document.getElementById("tab-register").classList.toggle("active", tab === "register");
  };

  document.getElementById("login-form").addEventListener("submit", async e => {
    e.preventDefault();
    const errEl = document.getElementById("login-err");
    errEl.textContent = "";
    try {
      await signInWithEmailAndPassword(auth,
        document.getElementById("login-email").value.trim(),
        document.getElementById("login-pass").value);
      hideModal();
    } catch (ex) { errEl.textContent = authErrMsg(ex.code); }
  });

  document.getElementById("reg-form").addEventListener("submit", async e => {
    e.preventDefault();
    const errEl    = document.getElementById("reg-err");
    errEl.textContent = "";
    const username = document.getElementById("reg-name").value.trim();
    const email    = document.getElementById("reg-email").value.trim();
    const pass     = document.getElementById("reg-pass").value;
    if (!username) { errEl.textContent = "Username is required."; return; }
    try {
      const cred = await createUserWithEmailAndPassword(auth, email, pass);
      await updateProfile(cred.user, { displayName: username });
      await setDoc(doc(db, "users", cred.user.uid), { username, email, createdAt: serverTimestamp() });
      hideModal();
    } catch (ex) { errEl.textContent = authErrMsg(ex.code); }
  });

  // ── Router ────────────────────────────────────────────────────────────────

  function render() {
    Object.values(unsubMap).forEach(u => u());
    unsubMap = {};
    if (unsubPosts) { unsubPosts(); unsubPosts = null; }
    currentThread ? renderThread() : renderForum();
  }

  // ── Forum (all categories stacked) ───────────────────────────────────────

  function renderForum() {
    const userHTML = currentUser
      ? `<span class="top-bar-user">${esc(currentUser.displayName || currentUser.email)}</span>
         <button class="logout-btn" onclick="doLogout()">Logout</button>`
      : `<span style="font-size:0.7rem;letter-spacing:1px;color:#444;text-transform:uppercase;font-weight:normal;">Browse freely — login to post</span>
         <button class="login-link" onclick="showModal()">Login / Register</button>`;

    appEl.innerHTML =
      `<div class="top-bar"><div class="top-bar-actions" style="margin-left:auto;">${userHTML}</div></div>` +
      CATEGORIES.map(cat => `
        <div class="category-section" id="cat-${esc(cat.replace(/\s+/g,'-'))}">
          <div class="category-header">
            <span class="category-name">${esc(cat)}</span>
            ${currentUser
              ? `<button class="new-thread-btn" onclick="showNewThread('${esc(cat)}')">+ New Thread</button>`
              : `<span class="login-to-post" onclick="showModal()">Login to post</span>`}
          </div>
          <div id="list-${esc(cat.replace(/\s+/g,'-'))}" class="threads-loading">Loading...</div>
        </div>`
      ).join("");

    CATEGORIES.forEach(cat => loadThreadsForCat(cat));
  }

  function loadThreadsForCat(cat) {
    const safeId = cat.replace(/\s+/g, "-");
    const wrap = document.getElementById(`list-${safeId}`);
    if (!wrap) return;

    const q = query(collection(db, "threads"), orderBy("lastActivity", "desc"));
    unsubMap[cat] = onSnapshot(q, snap => {
      threadsCache = {};
      snap.forEach(d => { threadsCache[d.id] = { id: d.id, ...d.data() }; });

      const filtered = Object.values(threadsCache).filter(t => t.category === cat);
      if (!document.getElementById(`list-${safeId}`)) return;

      if (filtered.length === 0) {
        wrap.innerHTML = `<div class="threads-empty">No threads yet.</div>`;
        return;
      }
      wrap.innerHTML = filtered.map(t => `
        <div class="thread-item" onclick="openThread('${esc(t.id)}')">
          <div class="thread-left">
            <div class="thread-title-text">${esc(t.title)}</div>
            <div class="thread-meta">by <b>${esc(t.authorName || "Unknown")}</b> &nbsp;·&nbsp; ${timeAgo(t.createdAt)}</div>
          </div>
          <div class="thread-reply-count">${t.replyCount || 0} ${t.replyCount === 1 ? "reply" : "replies"}</div>
        </div>`).join("");
    });
  }

  window.openThread = function(id) {
    currentThread = threadsCache[id];
    if (!currentThread) return;
    render();
  };

  // ── New thread form ───────────────────────────────────────────────────────

  window.showNewThread = function(cat) {
    const safeId = cat.replace(/\s+/g, "-");
    const section = document.getElementById(`cat-${safeId}`);
    if (!section) return;
    const existing = section.querySelector(".new-thread-form");
    if (existing) return;
    const form = document.createElement("div");
    form.className = "new-thread-form";
    form.id = `ntf-${safeId}`;
    form.innerHTML = `
      <input class="form-input" type="text" id="nt-title-${safeId}" placeholder="Thread title" maxlength="120">
      <textarea class="form-input" id="nt-body-${safeId}" placeholder="Write your post..."></textarea>
      <div class="form-error" id="nt-err-${safeId}"></div>
      <div class="form-row">
        <button class="cancel-btn" onclick="cancelNewThread('${esc(safeId)}')">Cancel</button>
        <button class="submit-btn" id="nt-sub-${safeId}" onclick="submitThread('${esc(cat)}','${esc(safeId)}')">Post Thread</button>
      </div>`;
    section.appendChild(form);
  };

  window.cancelNewThread = function(safeId) {
    const f = document.getElementById(`ntf-${safeId}`);
    if (f) f.remove();
  };

  window.submitThread = async function(cat, safeId) {
    const title = document.getElementById(`nt-title-${safeId}`).value.trim();
    const body  = document.getElementById(`nt-body-${safeId}`).value.trim();
    const errEl = document.getElementById(`nt-err-${safeId}`);
    const btn   = document.getElementById(`nt-sub-${safeId}`);
    errEl.textContent = "";
    if (!title) { errEl.textContent = "Title is required."; return; }
    if (!body)  { errEl.textContent = "Post body is required."; return; }
    btn.disabled = true;
    try {
      const ref = await addDoc(collection(db, "threads"), {
        title, body, category: cat,
        authorId:   currentUser.uid,
        authorName: currentUser.displayName || currentUser.email,
        createdAt:    serverTimestamp(),
        lastActivity: serverTimestamp(),
        replyCount: 0
      });
      currentThread = { id: ref.id, title, body, category: cat,
        authorName: currentUser.displayName || currentUser.email,
        createdAt: null, replyCount: 0 };
      render();
    } catch (ex) {
      errEl.textContent = "Failed to post. Try again.";
      btn.disabled = false;
    }
  };

  // ── Thread view ───────────────────────────────────────────────────────────

  function renderThread() {
    const t = currentThread;
    const replySection = currentUser
      ? `<div class="reply-form">
           <textarea class="form-input" id="reply-body" placeholder="Write a reply..." maxlength="2000"></textarea>
           <div class="form-error" id="reply-err"></div>
           <div class="form-row" style="justify-content:flex-end;">
             <button class="submit-btn" id="reply-submit" onclick="submitReply()">Post Reply</button>
           </div>
         </div>`
      : `<div class="login-to-reply">
           <span onclick="showModal()">Login or register</span> to post a reply.
         </div>`;

    appEl.innerHTML = `
      <div class="top-bar">
        <button class="back-btn" onclick="closeThread()">&#8592; Back to Forums</button>
        <div class="top-bar-actions">
          ${currentUser
            ? `<span class="top-bar-user">${esc(currentUser.displayName || currentUser.email)}</span>
               <button class="logout-btn" onclick="doLogout()">Logout</button>`
            : `<button class="login-link" onclick="showModal()">Login / Register</button>`}
        </div>
      </div>
      <div>
        <div class="thread-view-title">${esc(t.title)}</div>
        <div class="thread-view-meta">
          in <b>${esc(t.category)}</b> &nbsp;·&nbsp; by <b>${esc(t.authorName || "Unknown")}</b>
        </div>
        <div id="posts-wrap">
          <div class="post-item op">
            <div class="post-header">
              <span class="post-author">${esc(t.authorName || "Unknown")}</span>
              <span class="post-date">Original Post</span>
            </div>
            <div class="post-body">${esc(t.body || "")}</div>
          </div>
          <div id="replies-wrap"></div>
        </div>
        ${replySection}
      </div>`;

    loadReplies();
  }

  window.closeThread = function() {
    currentThread = null;
    render();
  };

  function loadReplies() {
    const wrap = document.getElementById("replies-wrap");
    if (!wrap) return;
    const q = query(
      collection(db, "threads", currentThread.id, "posts"),
      orderBy("createdAt", "asc")
    );
    unsubPosts = onSnapshot(q, snap => {
      const el = document.getElementById("replies-wrap");
      if (!el) return;
      el.innerHTML = snap.docs.map(d => {
        const p = d.data();
        return `<div class="post-item">
          <div class="post-header">
            <span class="post-author">${esc(p.authorName || "Unknown")}</span>
            <span class="post-date">${timeAgo(p.createdAt)}</span>
          </div>
          <div class="post-body">${esc(p.body || "")}</div>
        </div>`;
      }).join("");
    });
  }

  window.submitReply = async function() {
    const body  = document.getElementById("reply-body").value.trim();
    const errEl = document.getElementById("reply-err");
    const btn   = document.getElementById("reply-submit");
    errEl.textContent = "";
    if (!body) { errEl.textContent = "Reply cannot be empty."; return; }
    btn.disabled = true;
    try {
      await addDoc(collection(db, "threads", currentThread.id, "posts"), {
        body,
        authorId:   currentUser.uid,
        authorName: currentUser.displayName || currentUser.email,
        createdAt:  serverTimestamp()
      });
      await updateDoc(doc(db, "threads", currentThread.id), {
        replyCount:   increment(1),
        lastActivity: serverTimestamp()
      });
      document.getElementById("reply-body").value = "";
    } catch (ex) {
      errEl.textContent = "Failed to post reply. Try again.";
    }
    btn.disabled = false;
  };

  // ── Auth state ────────────────────────────────────────────────────────────

  window.doLogout = async function() { await signOut(auth); };

  onAuthStateChanged(auth, user => {
    currentUser   = user;
    currentThread = null;
    render();
  });
</script>
</body>
</html>
