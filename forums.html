<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forums | OGz C-Strike Gangstaz</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: Arial, sans-serif; font-weight: bold; background: #0d0d0d; color: #e0e0e0; line-height: 1.5; }

  header { background: linear-gradient(180deg, #0a0a0a 0%, #111 100%); border-bottom: 3px solid #1e90ff; text-align: center; padding: 40px 20px 30px; }
  header h1 { font-size: 3rem; letter-spacing: 4px; color: #fff; text-transform: uppercase; }
  header h2 { font-size: 1.1rem; letter-spacing: 6px; color: #1e90ff; text-transform: uppercase; margin-top: 8px; }

  nav { background: #161616; border-bottom: 1px solid #2a2a2a; display: flex; justify-content: center; gap: 4px; padding: 0 20px; flex-wrap: wrap; }
  nav a { color: #aaa; text-decoration: none; font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase; padding: 14px 20px; transition: color 0.2s, border-bottom 0.2s; border-bottom: 3px solid transparent; }
  nav a:hover { color: #1e90ff; border-bottom: 3px solid #1e90ff; }
  nav a.active { color: #1e90ff; border-bottom: 3px solid #1e90ff; }

  main { max-width: 900px; margin: 0 auto; padding: 40px 20px; display: flex; flex-direction: column; gap: 32px; }

  /* TOP BAR */
  .top-bar { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
  .top-bar-left { display: flex; align-items: center; gap: 10px; }
  .top-bar-avatar { width: 28px; height: 28px; object-fit: contain; image-rendering: pixelated; }
  .top-bar-user { font-size: 0.8rem; letter-spacing: 2px; color: #1e90ff; text-transform: uppercase; }
  .top-bar-actions { display: flex; gap: 8px; align-items: center; }
  .login-link { background: #1e90ff; color: #000; font-family: Arial, sans-serif; font-weight: bold; font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; padding: 8px 16px; border: none; cursor: pointer; transition: background 0.2s; }
  .login-link:hover { background: #4da6ff; }
  .logout-btn { background: none; border: 1px solid #2a2a2a; color: #555; font-family: Arial, sans-serif; font-weight: bold; font-size: 0.65rem; letter-spacing: 2px; text-transform: uppercase; padding: 6px 12px; cursor: pointer; transition: color 0.2s, border-color 0.2s; }
  .logout-btn:hover { color: #ff4444; border-color: #ff4444; }

  /* AUTH MODAL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
  .modal-box { background: #161616; border: 1px solid #2a2a2a; border-top: 3px solid #1e90ff; padding: 32px; width: 100%; max-width: 400px; max-height: 90vh; overflow-y: auto; }
  .modal-close { float: right; background: none; border: none; color: #555; font-size: 1.2rem; cursor: pointer; margin-top: -8px; margin-right: -8px; }
  .modal-close:hover { color: #fff; }
  .auth-tabs { display: flex; margin-bottom: 24px; border-bottom: 1px solid #2a2a2a; clear: both; }
  .auth-tab { padding: 10px 20px; font-size: 0.75rem; letter-spacing: 2px; text-transform: uppercase; color: #555; cursor: pointer; border: none; border-bottom: 3px solid transparent; margin-bottom: -1px; background: none; font-family: Arial, sans-serif; font-weight: bold; transition: color 0.2s; }
  .auth-tab.active { color: #1e90ff; border-bottom-color: #1e90ff; }
  .auth-form { display: flex; flex-direction: column; gap: 10px; }
  .auth-form label { font-size: 0.65rem; letter-spacing: 2px; text-transform: uppercase; color: #555; margin-bottom: -4px; }
  .auth-form input { background: #111; border: 1px solid #333; color: #fff; font-family: Arial, sans-serif; font-size: 0.85rem; padding: 10px 14px; outline: none; transition: border-color 0.2s; width: 100%; }
  .auth-form input:focus { border-color: #1e90ff; }
  .auth-submit { background: #1e90ff; color: #000; font-family: Arial, sans-serif; font-weight: bold; font-size: 0.75rem; letter-spacing: 2px; text-transform: uppercase; padding: 12px; border: none; cursor: pointer; transition: background 0.2s; margin-top: 4px; }
  .auth-submit:hover { background: #4da6ff; }
  .auth-error { font-size: 0.75rem; color: #ff4444; letter-spacing: 1px; min-height: 18px; font-weight: normal; }

  /* AVATAR PICKER */
  .avatar-pick { display: flex; gap: 12px; margin-top: 4px; }
  .avatar-opt { display: flex; flex-direction: column; align-items: center; gap: 6px; padding: 10px 16px; border: 2px solid #333; cursor: pointer; transition: border-color 0.2s, background 0.2s; background: #111; flex: 1; }
  .avatar-opt:hover { border-color: #555; }
  .avatar-opt.selected { border-color: #1e90ff; background: #0d1a2a; }
  .avatar-opt img { width: 40px; height: 40px; object-fit: contain; image-rendering: pixelated; }
  .avatar-opt span { font-size: 0.65rem; letter-spacing: 2px; text-transform: uppercase; color: #888; }
  .avatar-opt.selected span { color: #1e90ff; }

  /* CATEGORY SECTIONS */
  .category-section { display: flex; flex-direction: column; }
  .category-header { background: #111; border: 1px solid #2a2a2a; border-top: 3px solid #1e90ff; padding: 14px 18px; display: flex; justify-content: space-between; align-items: center; }
  .category-name { font-size: 0.75rem; letter-spacing: 4px; text-transform: uppercase; color: #1e90ff; }
  .new-thread-btn { background: #1e90ff; color: #000; font-family: Arial, sans-serif; font-weight: bold; font-size: 0.65rem; letter-spacing: 2px; text-transform: uppercase; padding: 7px 14px; border: none; cursor: pointer; transition: background 0.2s; }
  .new-thread-btn:hover { background: #4da6ff; }
  .login-to-post { font-size: 0.65rem; letter-spacing: 1px; color: #444; text-transform: uppercase; cursor: pointer; font-weight: normal; }
  .login-to-post:hover { color: #1e90ff; }

  /* THREAD LIST */
  .thread-item { background: #161616; border: 1px solid #1e1e1e; border-top: none; padding: 12px 18px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: background 0.15s; gap: 20px; }
  .thread-avatar { width: 64px; height: 64px; object-fit: contain; image-rendering: pixelated; flex-shrink: 0; }
  .thread-item:hover { background: #1c1c1c; }
  .thread-left { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 0; }
  .thread-title-text { font-size: 0.88rem; color: #fff; text-align: left; }
  .thread-meta { font-size: 0.65rem; color: #444; font-weight: normal; letter-spacing: 1px; text-align: left; }
  .thread-meta b { color: #1e90ff; font-weight: bold; }
  .thread-right { display: flex; flex-direction: column; align-items: flex-end; gap: 3px; flex-shrink: 0; }
  .thread-reply-count { font-size: 0.7rem; color: #555; text-transform: uppercase; letter-spacing: 1px; white-space: nowrap; }
  .thread-time { font-size: 0.65rem; color: #333; letter-spacing: 1px; font-weight: normal; white-space: nowrap; }
  .threads-empty { background: #111; border: 1px solid #1e1e1e; border-top: none; padding: 28px; text-align: left; font-size: 0.7rem; letter-spacing: 2px; color: #333; text-transform: uppercase; font-weight: normal; }
  .threads-loading { background: #111; border: 1px solid #1e1e1e; border-top: none; padding: 20px 18px; text-align: left; font-size: 0.7rem; color: #333; letter-spacing: 2px; text-transform: uppercase; font-weight: normal; }

  /* NEW THREAD FORM */
  .new-thread-form { background: #161616; border: 1px solid #2a2a2a; border-top: none; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
  .form-input { background: #111; border: 1px solid #333; color: #fff; font-family: Arial, sans-serif; font-size: 0.85rem; padding: 10px 14px; outline: none; transition: border-color 0.2s; width: 100%; }
  .form-input:focus { border-color: #1e90ff; }
  textarea.form-input { resize: vertical; min-height: 90px; font-weight: normal; }
  .form-row { display: flex; justify-content: space-between; align-items: center; gap: 12px; }
  .cancel-btn { background: none; border: 1px solid #2a2a2a; color: #555; font-family: Arial, sans-serif; font-weight: bold; font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; padding: 8px 16px; cursor: pointer; transition: color 0.2s, border-color 0.2s; }
  .cancel-btn:hover { color: #fff; border-color: #555; }
  .submit-btn { background: #1e90ff; color: #000; font-family: Arial, sans-serif; font-weight: bold; font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; padding: 8px 20px; border: none; cursor: pointer; transition: background 0.2s; }
  .submit-btn:hover { background: #4da6ff; }
  .submit-btn:disabled { background: #222; color: #555; cursor: default; }
  .form-error { font-size: 0.7rem; color: #ff4444; letter-spacing: 1px; min-height: 16px; font-weight: normal; }

  /* THREAD VIEW */
  .back-btn { background: none; border: none; color: #1e90ff; font-family: Arial, sans-serif; font-weight: bold; font-size: 0.75rem; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; padding: 0; margin-bottom: 12px; display: inline-block; }
  .back-btn:hover { color: #fff; }
  .thread-view-title { font-size: 1.2rem; color: #fff; margin-bottom: 4px; text-align: left; }
  .thread-view-meta { font-size: 0.65rem; color: #444; letter-spacing: 1px; font-weight: normal; margin-bottom: 16px; text-align: left; }
  .thread-view-meta b { color: #1e90ff; }

  /* POSTS — left column author, right column content */
  .post-item { background: #161616; border: 1px solid #1e1e1e; border-top: none; display: flex; flex-direction: row; }
  .post-item:first-child { border-top: 1px solid #1e1e1e; }
  .post-item.op { border-left: 3px solid #1e90ff; }
  .post-author-col { width: 120px; flex-shrink: 0; display: flex; flex-direction: column; align-items: center; padding: 16px 10px; border-right: 1px solid #1e1e1e; gap: 6px; }
  .post-avatar { width: 88px; height: 88px; object-fit: contain; image-rendering: pixelated; }
  .post-author-name { font-size: 0.65rem; letter-spacing: 1px; color: #1e90ff; text-transform: uppercase; text-align: center; word-break: break-word; }
  .post-content-col { flex: 1; min-width: 0; padding: 12px 16px; display: flex; flex-direction: column; gap: 8px; }
  .post-date { font-size: 0.65rem; color: #3a3a3a; font-weight: normal; letter-spacing: 1px; }
  .post-body { font-size: 0.85rem; color: #ccc; font-weight: normal; line-height: 1.65; white-space: pre-wrap; word-break: break-word; }

  /* FORMAT TOOLBAR */
  .fmt-wrap { border: 1px solid #333; transition: border-color 0.2s; }
  .fmt-wrap:focus-within { border-color: #1e90ff; }
  .fmt-editor { background: #111; color: #fff; font-family: Arial, sans-serif; font-size: 0.85rem; font-weight: normal; padding: 10px 14px; outline: none; min-height: 120px; line-height: 1.6; word-break: break-word; white-space: pre-wrap; }
  .fmt-editor-tall { min-height: 140px; }
  .fmt-editor:empty:before { content: attr(data-placeholder); color: #444; pointer-events: none; }
  .fmt-bar { display: flex; align-items: center; gap: 2px; background: #0f0f0f; border-top: 1px solid #222; padding: 5px 8px; flex-wrap: wrap; }
  .fmt-btn { background: #1a1a1a; border: 1px solid #2a2a2a; color: #bbb; font-family: Arial, sans-serif; font-size: 0.8rem; padding: 3px 9px; cursor: pointer; transition: background 0.15s, color 0.15s; line-height: 1.4; }
  .fmt-btn:hover { background: #2a2a2a; color: #fff; }
  .fmt-sep { width: 1px; height: 18px; background: #2a2a2a; margin: 0 5px; flex-shrink: 0; }
  .fmt-emoji { background: none; border: none; font-size: 1.05rem; cursor: pointer; padding: 2px 3px; border-radius: 3px; transition: background 0.15s; line-height: 1; }
  .fmt-emoji:hover { background: #2a2a2a; }

  /* REPLY FORM */
  .reply-form { background: #161616; border: 1px solid #2a2a2a; border-top: none; padding: 16px 18px; display: flex; flex-direction: column; gap: 10px; }
  .login-to-reply { background: #161616; border: 1px solid #1e1e1e; border-top: none; padding: 16px 18px; font-size: 0.75rem; color: #444; text-align: left; letter-spacing: 1px; text-transform: uppercase; font-weight: normal; }
  .login-to-reply span { color: #1e90ff; cursor: pointer; font-weight: bold; }
  .login-to-reply span:hover { text-decoration: underline; }

  /* IMAGE / LINK INSERT ROW */
  .fmt-insert-row { display: none; align-items: center; gap: 6px; padding: 6px 8px; background: #0a0a0a; border-top: 1px solid #1a1a1a; flex-wrap: wrap; }
  .fmt-insert-row.active { display: flex; }
  .fmt-url-input { flex: 1; min-width: 80px; background: #111; border: 1px solid #333; color: #fff; font-family: Arial, sans-serif; font-weight: normal; font-size: 0.78rem; padding: 4px 8px; outline: none; transition: border-color 0.2s; }
  .fmt-url-input:focus { border-color: #1e90ff; }
  .fmt-label-input { flex: 0 0 140px; }
  .fmt-insert-ok { background: #1e90ff; border: none; color: #000; font-family: Arial, sans-serif; font-weight: bold; font-size: 0.68rem; letter-spacing: 1px; text-transform: uppercase; padding: 4px 12px; cursor: pointer; flex-shrink: 0; }
  .fmt-insert-ok:hover { background: #4da6ff; }
  .fmt-insert-cancel { background: none; border: none; color: #444; font-size: 1rem; cursor: pointer; padding: 2px 5px; flex-shrink: 0; line-height: 1; }
  .fmt-insert-cancel:hover { color: #fff; }
  /* IMAGE RESIZE BAR */
  .img-resize-bar { position: fixed; z-index: 300; background: #1a1a1a; border: 1px solid #333; border-top: 2px solid #1e90ff; padding: 6px 8px; display: flex; align-items: center; gap: 5px; flex-wrap: wrap; box-shadow: 0 4px 16px rgba(0,0,0,0.5); }
  .img-resize-bar.hidden { display: none !important; }
  .img-resize-selected { border-color: #1e90ff !important; color: #1e90ff !important; }
  .img-resize-px { width: 56px; flex: none; }

  .post-body img { max-width: 100%; height: auto; display: block; margin: 6px 0; border-radius: 2px; }
  .post-body a { color: #1e90ff; text-decoration: none; word-break: break-all; }
  .post-body a:hover { text-decoration: underline; }

  /* DELETE / PROFILE */
  .delete-post-btn { background: none; border: none; color: #2a2a2a; font-size: 0.85rem; cursor: pointer; padding: 0 0 0 8px; vertical-align: middle; transition: color 0.15s; }
  .delete-post-btn:hover { color: #ff4444; }
  .post-sig { font-size: 0.7rem; color: #3a3a3a; font-weight: normal; word-break: break-word; text-align: left; margin-top: 8px; border-top: 1px solid #1e1e1e; padding-top: 8px; line-height: 1.5; }
  .profile-link:hover { text-decoration: underline; }

  .forums-logo { width: 200px; height: 200px; object-fit: contain; filter: drop-shadow(0 0 16px rgba(30,144,255,0.35)); transition: transform 0.2s, filter 0.2s; }
  .forums-logo:hover { transform: translateY(-3px); filter: drop-shadow(0 0 24px rgba(30,144,255,0.6)); }

  footer { background: #0a0a0a; border-top: 1px solid #1e1e1e; text-align: center; padding: 28px 20px; font-size: 0.7rem; letter-spacing: 2px; color: #444; text-transform: uppercase; }
  .hidden { display: none !important; }

  @media (max-width: 600px) {
    header h1 { font-size: 1.8rem; }
    .post-author-col { width: 90px; }
    .post-avatar { width: 68px; height: 68px; }
  }
</style>

<main id="app">

</main>

<div id="auth-modal" class="hidden">
  <div class="modal-overlay" onclick="closeModal(event)">
    <div class="modal-box">
      <button class="modal-close" onclick="hideModal()">&#10005;</button>
      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-login"    onclick="switchTab('login')">Login</button>
        <button class="auth-tab"        id="tab-register" onclick="switchTab('register')">Register</button>
      </div>
      <div id="pane-login">
        <form class="auth-form" id="login-form">
          <label>Email</label>
          <input type="email" id="login-email" required autocomplete="email">

          <label>Username</label>

          <label>Password</label>
          <input type="password" id="reg-pass" minlength="6" required autocomplete="new-password">
          <label>Choose your icon</label>
          <div class="avatar-pick">
            <div class="avatar-opt selected" id="av-ct" onclick="selectAvatar('ct.png')">
              <img src="ct.png" alt="CT">
              <span>CT</span>
            </div>
            <div class="avatar-opt" id="av-t" onclick="selectAvatar('t.png')">
              <img src="t.png" alt="T">
              <span>T</span>
            </div>
          </div>
          <div class="auth-error" id="reg-err"></div>
          <button type="submit" class="auth-submit">Create Account</button>
        </form>
      </div>
    </div>
  </div>
</div>

<div id="profile-modal" class="hidden">
  <div class="modal-overlay" onclick="closeProfileModal(event)">
    <div class="modal-box" id="profile-modal-inner"></div>
  </div>
</div>

<div id="img-resize-bar" class="img-resize-bar hidden">

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, updateProfile } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
  import { getFirestore, collection, collectionGroup, addDoc, doc, getDoc, getDocs, setDoc, updateDoc, deleteDoc, increment, query, where, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCGpy67LqR4cosW2OM8lbLcCNT6ir74Lxk",
    authDomain: "superhero-34095.firebaseapp.com",
    databaseURL: "https://superhero-34095-default-rtdb.firebaseio.com",
    projectId: "superhero-34095",
    storageBucket: "superhero-34095.firebasestorage.app",
    messagingSenderId: "709820811872",
    appId: "1:709820811872:web:71ea577ddff2756d131105"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db   = getFirestore(app);

  const CATEGORIES = ["General", "Off-Topic", "Hero Requests"];
  const AVATAR_OVERRIDE = { "LOOTENANT BIG POOPIE": "arctic.png" };

  const appEl = document.getElementById("app");

  let currentUser           = null;
  let currentUserAvatar     = "ct.png";
  let currentUserSignature  = "";
  let currentThread         = null;
  let threadsCache          = {};
  let unsubMap              = {};
  let unsubPosts            = null;
  let selectedAvatar        = "ct.png";
  let profileSelectedAvatar = "ct.png";
  const profileCache        = {};
  const _fmtState           = {};

  // ── Utilities ─────────────────────────────────────────────────────────────

  function esc(str) {
    return String(str || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  function timeAgo(ts) {
    if (!ts) return "";
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    const diff = Date.now() - d.getTime();
    if (diff < 60000)      return "just now";
    if (diff < 3600000)    return Math.floor(diff/60000) + "m ago";
    if (diff < 86400000)   return Math.floor(diff/3600000) + "h ago";
    if (diff < 2592000000) return Math.floor(diff/86400000) + "d ago";
    return d.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
  }

  function resolveAvatar(username, saved) {
    if (AVATAR_OVERRIDE[username]) return AVATAR_OVERRIDE[username];
    return saved || "ct.png";
  }

  async function getUserProfile(uid) {
    if (!uid) return null;
    if (uid in profileCache) return profileCache[uid];
    try {
      const snap = await getDoc(doc(db, "users", uid));
      profileCache[uid] = snap.exists() ? snap.data() : null;
    } catch (_) { profileCache[uid] = null; }
    return profileCache[uid];
  }

  function authErrMsg(code) {
    return ({
      "auth/invalid-email":        "Invalid email address.",
      "auth/user-not-found":       "No account found.",
      "auth/wrong-password":       "Incorrect password.",
      "auth/invalid-credential":   "Invalid email or password.",
      "auth/email-already-in-use": "Email already registered.",
      "auth/weak-password":        "Password must be at least 6 characters.",
      "auth/too-many-requests":    "Too many attempts. Try again later."
    })[code] || "Something went wrong. Try again.";
  }

  // ── Avatar picker ─────────────────────────────────────────────────────────

    </div>

      <button type="button" class="fmt-insert-cancel" onclick="hideFmtInsert('${wid}')">&#10005;</button>
    </div>`;

  function sanitizeHTML(html) {
    const ALLOWED = new Set(['b','strong','i','em','u','s','strike','span','br','div','p','img','a']);
    const SAFE_URL = url => /^https?:\/\//i.test(url);
    const tmp = document.createElement("div");
    tmp.innerHTML = html;
    function clean(el) {
      [...el.childNodes].forEach(node => {
        if (node.nodeType === 3) return;
        if (node.nodeType !== 1) { node.remove(); return; }
        const tag = node.tagName.toLowerCase();
        if (!ALLOWED.has(tag)) {
          while (node.firstChild) node.parentNode.insertBefore(node.firstChild, node);
          node.remove();
          return;
        }
        if (tag === 'img') {
          const src = node.getAttribute('src') || '';
          const w   = node.style.width || '';
          [...node.attributes].forEach(a => node.removeAttribute(a.name));
          if (SAFE_URL(src)) {
            node.setAttribute('src', src);
            node.setAttribute('alt', '');
            const safeW = /^(\d+(\.\d+)?(px|%))$/.test(w.trim()) ? `width:${w};` : '';
            node.setAttribute('style', `max-width:100%;height:auto;${safeW}`);
          } else { node.remove(); }
          return;
        }
        if (tag === 'a') {
          const href = node.getAttribute('href') || '';
          [...node.attributes].forEach(a => node.removeAttribute(a.name));
          if (SAFE_URL(href)) {
            node.setAttribute('href', href);
            node.setAttribute('target', '_blank');
            node.setAttribute('rel', 'noopener noreferrer');
          } else {
            while (node.firstChild) node.parentNode.insertBefore(node.firstChild, node);
            node.remove();
            return;
          }
          clean(node);
          return;
        }
        [...node.attributes].forEach(a => { if (a.name !== 'style') node.removeAttribute(a.name); });
        if (node.hasAttribute('style')) {
          const safe = {};
          ['font-weight','font-style','text-decoration'].forEach(p => {
            const v = node.style.getPropertyValue(p);
            if (v) safe[p] = v;
          });
          node.removeAttribute('style');
          Object.entries(safe).forEach(([k, v]) => node.style.setProperty(k, v));
        }
        clean(node);
      });
    }
    clean(tmp);
    return tmp.innerHTML;
  }

  // ── Image / link insert ───────────────────────────────────────────────────

  window.showFmtInsert = function(wid, type) {
    const row   = document.getElementById('fir-' + wid);
    const urlIn = document.getElementById('fiu-' + wid);
    const lblIn = document.getElementById('fil-' + wid);
    if (!row) return;

    const isOpen   = row.classList.contains('active');
    const sameType = _fmtState[wid]?.type === type;

    // Capture cursor position before anything changes focus
    const sel   = window.getSelection();
    const range = sel.rangeCount ? sel.getRangeAt(0).cloneRange() : null;

    if (isOpen && sameType) { hideFmtInsert(wid); return; }

    _fmtState[wid] = { range, type };
    urlIn.placeholder = type === 'img' ? 'https://example.com/image.png' : 'https://example.com/file.zip';
    urlIn.value = '';
    lblIn.value = '';
    lblIn.classList.toggle('hidden', type === 'img');
    row.classList.add('active');
    setTimeout(() => urlIn.focus(), 0);
  };

  window.hideFmtInsert = function(wid) {
    document.getElementById('fir-' + wid)?.classList.remove('active');
  };

  window.confirmFmtInsert = function(wid) {
    const urlIn = document.getElementById('fiu-' + wid);
    const lblIn = document.getElementById('fil-' + wid);
    const url   = (urlIn?.value || '').trim();
    const state = _fmtState[wid];

    if (!/^https?:\/\//i.test(url)) {
      if (urlIn) { urlIn.style.borderColor = '#ff4444'; setTimeout(() => urlIn.style.borderColor = '', 1200); }
      return;
    }

    // Restore cursor to editor
    if (state?.range) {
      const sel = window.getSelection();
      sel.removeAllRanges();
      sel.addRange(state.range);
    }

    const safeUrl = url.replace(/"/g, '%22');

    if (state?.type === 'img') {
      document.execCommand('insertHTML', false,
        `<img src="${safeUrl}" alt="" style="max-width:100%;height:auto;">`);
    } else {
      const rawLabel = (lblIn?.value || '').trim() || url.split('/').pop().split('?')[0] || 'attachment';
      const label    = rawLabel.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      document.execCommand('insertHTML', false,
        `<a href="${safeUrl}" target="_blank" rel="noopener noreferrer">📎 ${label}</a>`);
    }

    hideFmtInsert(wid);
  };

  let _resizeTarget = null;

  window.onEditorClick = function(e) {

  function showImgResize(img) {
    _resizeTarget = img;
    const bar  = document.getElementById('img-resize-bar');
    const rect = img.getBoundingClientRect();
    bar.style.top  = Math.min(rect.bottom + 6, window.innerHeight - 60) + 'px';
    bar.style.left = Math.max(4, Math.min(rect.left, window.innerWidth - 340)) + 'px';
    // Highlight whichever preset matches current width
    const cur = img.style.width || '';
    bar.querySelectorAll('[data-w]').forEach(btn => {
      btn.classList.toggle('img-resize-selected', btn.dataset.w === cur);
    });
    document.getElementById('img-resize-px').value = '';
    bar.classList.remove('hidden');
  }

  window.hideImgResize = function() {
    _resizeTarget = null;
    document.getElementById('img-resize-bar')?.classList.add('hidden');
  };

  window.setImgWidth = function(val) {
    if (!_resizeTarget) return;
    _resizeTarget.style.width    = val;
    _resizeTarget.style.maxWidth = '100%';
    _resizeTarget.style.height   = 'auto';
    // Update button highlights
    document.getElementById('img-resize-bar').querySelectorAll('[data-w]').forEach(btn => {
      btn.classList.toggle('img-resize-selected', btn.dataset.w === val);
    });
  };

  window.applyImgPx = function() {
    const input = document.getElementById('img-resize-px');

  document.addEventListener('click', e => {

          <div style="display:flex;flex-direction:column;align-items:center;gap:8px;margin-bottom:20px;clear:both;">
            <img src="${esc(avatar)}" style="width:80px;height:80px;object-fit:contain;image-rendering:pixelated;">
            <span style="font-size:0.9rem;color:#fff;letter-spacing:2px;text-transform:uppercase;">${esc(username)}</span>
            ${isOwner ? `<span style="font-size:0.55rem;letter-spacing:2px;color:#ff3333;text-transform:uppercase;">Owner</span>` : ""}
            <span style="font-size:0.65rem;color:#444;letter-spacing:1px;font-weight:normal;">Joined ${joined}</span>
          </div>
          <div style="border-top:1px solid #2a2a2a;padding-top:16px;display:flex;flex-direction:column;gap:10px;">
            ${!isOwner ? `
            <span style="font-size:0.65rem;letter-spacing:2px;text-transform:uppercase;color:#555;margin-bottom:-4px;">Icon</span>
            <div class="avatar-pick">
              <div class="avatar-opt${profileSelectedAvatar === 'ct.png' ? ' selected' : ''}" id="pav-ct" onclick="selectProfileAvatar('ct.png')">
                <img src="ct.png" alt="CT"><span>CT</span>
              </div>
              <div class="avatar-opt${profileSelectedAvatar === 't.png' ? ' selected' : ''}" id="pav-t" onclick="selectProfileAvatar('t.png')">
                <img src="t.png" alt="T"><span>T</span>
              </div>
            </div>` : ""}
            <span style="font-size:0.65rem;letter-spacing:2px;text-transform:uppercase;color:#555;margin-bottom:-4px;">Signature</span>
            <textarea id="profile-sig" class="form-input" style="min-height:70px;font-weight:normal;resize:vertical;" maxlength="200" placeholder="Your forum signature (optional)">${esc(sig)}</textarea>
            <div class="auth-error" id="profile-save-err"></div>
            <button class="auth-submit" onclick="saveProfile('${esc(uid)}')">Save Changes</button>
          </div>`;
      } else {
        inner.innerHTML = `
          <button class="modal-close" onclick="closeProfileModalDirect()">&#10005;</button>
          <div style="display:flex;flex-direction:column;align-items:center;gap:8px;clear:both;">
            <img src="${esc(avatar)}" style="width:80px;height:80px;object-fit:contain;image-rendering:pixelated;">
            <span style="font-size:0.9rem;color:#fff;letter-spacing:2px;text-transform:uppercase;">${esc(username)}</span>
            ${isOwner ? `<span style="font-size:0.55rem;letter-spacing:2px;color:#ff3333;text-transform:uppercase;">Owner</span>` : ""}
            <span style="font-size:0.65rem;color:#444;letter-spacing:1px;font-weight:normal;">Joined ${joined}</span>
            ${sig ? `<div style="margin-top:12px;border-top:1px solid #2a2a2a;padding-top:12px;width:100%;text-align:center;font-size:0.8rem;color:#666;font-weight:normal;font-style:italic;word-break:break-word;">${esc(sig)}</div>` : ""}
          </div>`;
      }
    } catch (ex) {
      inner.innerHTML = `<button class="modal-close" onclick="closeProfileModalDirect()">&#10005;</button><div style="color:#ff4444;font-size:0.75rem;padding:20px 0;">Failed to load profile.</div>`;
    }
  };

  window.saveProfile = async function(uid) {
    const errEl = document.getElementById("profile-save-err");
    errEl.textContent = "";
    const btn = document.querySelector("#profile-modal-inner .auth-submit");
    if (btn) btn.disabled = true;
    const sig       = document.getElementById("profile-sig").value.trim();
    const username  = currentUser.displayName;
    const newAvatar = AVATAR_OVERRIDE[username] ? resolveAvatar(username, null) : profileSelectedAvatar;

    // Save the user doc first — if this fails, show the error and stop
    try {
      await updateDoc(doc(db, "users", uid), { avatar: newAvatar, signature: sig });
    } catch (ex) {
      console.error("saveProfile user doc:", ex);
      errEl.textContent = "Failed to save. Try again.";
      if (btn) btn.disabled = false;
      return;
    }

    // Update in-memory cache so the new signature shows immediately without a page reload
    profileCache[uid] = { ...(profileCache[uid] || {}), avatar: newAvatar, signature: sig };

    currentUserAvatar    = resolveAvatar(username, newAvatar);
    currentUserSignature = sig;
    closeProfileModalDirect();
    render();
  };

  // ── Delete ─────────────────────────────────────────────────────────────────

  window.deletePost = async function(postId) {
    if (!confirm("Delete this post?")) return;
    try {
      await deleteDoc(doc(db, "threads", currentThread.id, "posts", postId));
      await updateDoc(doc(db, "threads", currentThread.id), {
        replyCount:   increment(-1),
        lastActivity: serverTimestamp()
      });
    } catch (ex) { alert("Failed to delete post."); }
  };

  window.deleteThread = async function() {
    if (!confirm("Delete this entire thread? This cannot be undone.")) return;
    try {
      await deleteDoc(doc(db, "threads", currentThread.id));
      currentThread = null;
      render();
    } catch (ex) { alert("Failed to delete thread."); }
  };

  // ── Auth state ────────────────────────────────────────────────────────────

  window.doLogout = async function() { await signOut(auth); };

  onAuthStateChanged(auth, async user => {
    currentUser = user;
    currentThread = null;
    if (user) {
      try {
        const snap = await getDoc(doc(db, "users", user.uid));
        if (snap.exists()) {
          currentUserAvatar    = resolveAvatar(user.displayName, snap.data().avatar);
          currentUserSignature = snap.data().signature || "";
        } else {
          currentUserAvatar    = resolveAvatar(user.displayName, null);
          currentUserSignature = "";
        }
      } catch (_) {
        currentUserAvatar    = resolveAvatar(user.displayName, null);
        currentUserSignature = "";
      }
    }
    render();
  });
</script>
</body>
</html>
